name: Update data

on:
  schedule:
    - cron: '0 3 * * *'   # 3 AM UTC every night
  workflow_dispatch:       # also triggerable manually from the Actions tab

permissions:
  contents: write          # needed to push the updated JSON files

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update papers.json
        run: python process_papers.py

      - name: Update superlist.json
        run: python process_superlist.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add papers.json superlist.json
          git diff --cached --quiet \
            && echo "No changes to commit." \
            || git commit -m "chore: nightly data refresh [skip ci]"
          git push
