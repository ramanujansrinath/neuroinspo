<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spirograph — NEUROINSPO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    :root {
      --bg:               #edeae3;
      --card-bg:          #ffffff;
      --text:             #1c1a17;
      --text-mid:         #6b6760;
      --text-dim:         #a09c96;
      --shadow-rest:      0 2px 8px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
      --shadow-card:      0 16px 48px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      --ease-out:         cubic-bezier(0.22, 1, 0.36, 1);
      --radius:           18px;
      --header-h:         60px;
      --panel-collapsed:  48px;
      --panel-open:       52vh;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      flex-shrink: 0;
      background: rgba(237, 234, 227, 0.92);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      padding: 0 28px;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      color: var(--text);
      flex-shrink: 0;
    }
    .logo-icon svg { width: 100%; height: 100%; }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      user-select: none;
    }

    .logo-by {
      font-weight: 300;
      letter-spacing: 0.08em;
    }

    /* ── Content row ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 230px;
      min-width: 230px;
      background: var(--card-bg);
      border-right: 1px solid rgba(0,0,0,0.07);
      padding: 28px 20px 24px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Mobile handle — hidden on desktop */
    #sidebar-handle { display: none; }

    #sidebar-body {
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex: 1;
    }

    #sidebar-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .control-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .control-name {
      font-size: 12.5px;
      color: var(--text-mid);
      font-weight: 500;
    }

    .control-value {
      font-size: 11.5px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, monospace;
    }

    input[type="range"] {
      width: 100%;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(0,0,0,0.12);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { opacity: 0.65; }

    .color-control {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    /* z-depth controls — revealed on canvas drag */
    #controls-3d {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    input[type="color"] {
      width: 100%;
      height: 34px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      cursor: pointer;
      background: none;
      padding: 2px;
      outline: none;
    }

    .btn-row {
      margin-top: auto;
      display: flex;
      gap: 8px;
    }

    .btn-row button {
      flex: 1;
      padding: 8px 0;
      background: rgba(0,0,0,0.06);
      color: var(--text-mid);
      border: none;
      border-radius: 100px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }

    .btn-row button:hover {
      background: rgba(0,0,0,0.11);
      color: var(--text);
    }

    .btn-row button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    #pause-btn.paused {
      background: var(--text);
      color: var(--card-bg);
    }

    /* ── Main (canvas area) ── */
    #main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 28px;
      min-width: 0;
    }

    #canvas-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
    }

    /* ── Mobile ── */
    @media (max-width: 540px) {

      header { padding: 0 16px; }
      .logo-text { font-size: 13px; }

      #content { flex-direction: column; }

      /* Canvas area — sits above the bottom sheet */
      #main {
        flex: none;
        width: 100%;
        padding: 12px;
        height: calc(100vh - var(--header-h) - var(--panel-collapsed));
        transition: height 0.35s var(--ease-out);
      }

      #content.panel-open #main {
        height: calc(100vh - var(--header-h) - var(--panel-open));
      }

      /* Bottom sheet */
      #sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        min-width: unset;
        border-right: none;
        border-top: 1px solid rgba(0,0,0,0.07);
        border-radius: 18px 18px 0 0;
        padding: 0;
        height: var(--panel-collapsed);
        overflow: hidden;
        transition: height 0.35s var(--ease-out);
        z-index: 100;
        box-shadow: 0 -4px 24px rgba(0,0,0,0.08);
      }

      #sidebar.open {
        height: var(--panel-open);
        overflow-y: auto;
      }

      /* Handle strip */
      #sidebar-handle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: var(--panel-collapsed);
        padding: 0 20px;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
      }

      #handle-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      #handle-chevron {
        font-size: 14px;
        color: var(--text-dim);
        transition: transform 0.3s var(--ease-out);
        line-height: 1;
      }

      #sidebar.open #handle-chevron {
        transform: rotate(180deg);
      }

      /* Desktop title hidden on mobile (handle label replaces it) */
      #sidebar-title { display: none; }

      #sidebar-body {
        padding: 4px 20px 24px;
        gap: 20px;
      }

      .btn-row { margin-top: 0; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo-group" href="index.html" aria-label="neuroinspo home">
    <div class="logo-icon">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="5.5" fill="currentColor"/>
        <line x1="22" y1="16" x2="22" y2="4"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="22" y1="28" x2="22" y2="40" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="16" y1="22" x2="4"  y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="28" y1="22" x2="40" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="17.5" y1="17.5" x2="8"  y2="8"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="26.5" y1="26.5" x2="36" y2="36" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="26.5" y1="17.5" x2="36" y2="8"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="17.5" y1="26.5" x2="8"  y2="36" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="22" cy="4"  r="2" fill="currentColor"/>
        <circle cx="22" cy="40" r="2" fill="currentColor"/>
        <circle cx="4"  cy="22" r="2" fill="currentColor"/>
        <circle cx="40" cy="22" r="2" fill="currentColor"/>
        <circle cx="8"  cy="8"  r="2" fill="currentColor"/>
        <circle cx="36" cy="36" r="2" fill="currentColor"/>
        <circle cx="36" cy="8"  r="2" fill="currentColor"/>
        <circle cx="8"  cy="36" r="2" fill="currentColor"/>
      </svg>
    </div>
    <span class="logo-text">SPIROGRAPH <span class="logo-by">by</span> NEUROINSPO</span>
  </a>
</header>

<div id="content">

  <aside id="sidebar">
    <!-- Mobile handle (hidden on desktop) -->
    <div id="sidebar-handle">
      <span id="handle-label">Controls</span>
      <span id="handle-chevron">▾</span>
    </div>

    <!-- Sidebar / panel body -->
    <div id="sidebar-body">
      <div id="sidebar-title">Parameters</div>

      <div class="controls">
        <div class="control">
          <div class="control-header">
            <span class="control-name">R — outer radius</span>
            <span class="control-value" id="R-val">131</span>
          </div>
          <input type="range" id="R" min="10" max="300" value="131" step="1">
        </div>

        <div class="control">
          <div class="control-header">
            <span class="control-name">r — inner radius</span>
            <span class="control-value" id="r-val">117</span>
          </div>
          <input type="range" id="r" min="10" max="300" value="117" step="1">
        </div>

        <div class="control">
          <div class="control-header">
            <span class="control-name">d — pen distance</span>
            <span class="control-value" id="d-val">221</span>
          </div>
          <input type="range" id="d" min="10" max="400" value="221" step="1">
        </div>

        <div class="control">
          <div class="control-header">
            <span class="control-name">Speed</span>
            <span class="control-value" id="speed-val">0.20</span>
          </div>
          <input type="range" id="speed" min="0.01" max="1.0" value="0.2" step="0.01">
        </div>

        <div class="control">
          <div class="control-header">
            <span class="control-name">Trail length</span>
            <span class="control-value" id="trail-val">4000</span>
          </div>
          <input type="range" id="trail" min="50" max="20000" value="4000" step="50">
        </div>

        <div class="color-control">
          <span class="control-name">Color</span>
          <input type="color" id="color" value="#5200AA">
        </div>

        <!-- z controls — revealed when canvas is dragged to tilt -->
        <div id="controls-3d" hidden>
          <div class="control">
            <div class="control-header">
              <span class="control-name">z — depth</span>
              <span class="control-value" id="depth3d-val">80</span>
            </div>
            <input type="range" id="depth3d" min="0" max="300" value="80" step="1">
          </div>
          <div class="control">
            <div class="control-header">
              <span class="control-name">z — frequency</span>
              <span class="control-value" id="freq3d-val">1.0</span>
            </div>
            <input type="range" id="freq3d" min="0.01" max="2" value="1.0" step="0.01">
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button id="pause-btn" title="Pause">⏸</button>
        <button id="camera-btn" title="Freeze to canvas">📷</button>
        <button id="clear-btn" title="Clear canvas">⟳</button>
      </div>
    </div>
  </aside>

  <div id="main">
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

</div>

<script>
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const wrap    = document.getElementById('canvas-wrap');
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('content');
  const handle  = document.getElementById('sidebar-handle');

  // ── Parameters ──
  let R           = 131;
  let r           = 117;
  let d           = 221;
  let speed       = 0.2;
  let color       = '#5200AA';
  let trailLength = 4000;

  // ── 3D parameters ──
  let depth3D = 80;
  let freq3D  = 1.0;

  // View angles — 0/0 = flat top-down (classic look); drag canvas to orbit
  let tiltDeg = 0;   // 0 = top-down, 90 = edge-on
  let azimDeg = 0;   // rotation around Z axis

  // Orthographic projection: rotate by azim around Z, then tilt around new X
  function project(x, y, z) {
    const a  = azimDeg * Math.PI / 180;
    const t  = tiltDeg * Math.PI / 180;
    const ca = Math.cos(a), sa = Math.sin(a);
    const ct = Math.cos(t), st = Math.sin(t);
    const xr = x * ca + y * sa;
    const yr = -x * sa + y * ca;
    return [xr, yr * ct - z * st];
  }

  function drawZPlane() {
    const scale = (canvas.width / 2) / HALF_RANGE;
    const cx    = canvas.width  / 2;
    const cy    = canvas.height / 2;
    const lw    = 1 / scale;   // 1 px in screen space

    // Dynamic projection transform: math-space (x,y) on z=0 → canvas
    const a  = azimDeg * Math.PI / 180;
    const t  = tiltDeg * Math.PI / 180;
    const ca = Math.cos(a), sa = Math.sin(a), ct = Math.cos(t);
    ctx.save();
    ctx.transform(ca*scale, sa*ct*scale, sa*scale, -ca*ct*scale, cx, cy);

    // Gray fill
    ctx.fillStyle = 'rgba(140, 140, 140, 0.12)';
    ctx.fillRect(-HALF_RANGE, -HALF_RANGE, HALF_RANGE * 2, HALF_RANGE * 2);

    // Grid lines
    const step = HALF_RANGE / 4;   // 8 cells across
    ctx.strokeStyle = 'rgba(90, 90, 90, 0.15)';
    ctx.lineWidth   = lw;
    ctx.beginPath();
    for (let i = -4; i <= 4; i++) {
      ctx.moveTo(-HALF_RANGE, i * step);
      ctx.lineTo( HALF_RANGE, i * step);
      ctx.moveTo(i * step, -HALF_RANGE);
      ctx.lineTo(i * step,  HALF_RANGE);
    }
    ctx.stroke();

    // Border
    ctx.strokeStyle = 'rgba(90, 90, 90, 0.25)';
    ctx.lineWidth   = lw * 1.5;
    ctx.strokeRect(-HALF_RANGE, -HALF_RANGE, HALF_RANGE * 2, HALF_RANGE * 2);

    ctx.restore();
  }

  // ── State ──
  let angle        = 0;
  let liftPen      = false;
  let paused       = false;
  let frozenCanvas = new OffscreenCanvas(1, 1);
  let frozenCtx    = frozenCanvas.getContext('2d');
  // Each point: { x, y, color, lift }
  let trail = [];

  const HALF_RANGE = 720;

  function resize() {
    const rect = wrap.getBoundingClientRect();
    const size = Math.floor(Math.min(rect.width, rect.height)) - 4;
    if (size <= 0 || size === canvas.width) return;
    const tmp = new OffscreenCanvas(size, size);
    tmp.getContext('2d').drawImage(frozenCanvas, 0, 0, size, size);
    canvas.width  = size;
    canvas.height = size;
    frozenCanvas = new OffscreenCanvas(size, size);
    frozenCtx    = frozenCanvas.getContext('2d');
    frozenCtx.drawImage(tmp, 0, 0);
  }

  function toCanvas(x, y) {
    const scale = (canvas.width / 2) / HALF_RANGE;
    return [canvas.width / 2 + x * scale, canvas.height / 2 - y * scale];
  }

  function step() {
    angle += speed;
    const x = (R - r) * Math.cos(angle) + d * Math.cos(((R - r) / r) * angle);
    const y = (R - r) * Math.sin(angle) - d * Math.sin(((R - r) / r) * angle);
    const z = depth3D * Math.sin(freq3D * angle);
    // Store math-space coords so the trail rescales correctly on canvas resize
    trail.push({ x, y, z, color, lift: liftPen });
    liftPen = false;
    if (trail.length > trailLength) trail.splice(0, trail.length - trailLength);
  }

  // Draw trail segments filtered by z sign (for depth sorting around the z=0 plane).
  // belowPlane=true  → only segments where z < 0  (drawn behind the plane)
  // belowPlane=false → only segments where z >= 0 (drawn in front of the plane)
  // When not in 3D mode belowPlane=false draws everything (z is always 0).
  function renderTrailPass(belowPlane) {
    if (trail.length < 2) return;
    let segStart = 0;
    for (let i = 1; i <= trail.length; i++) {
      const atEnd      = i === trail.length;
      const colorBreak = !atEnd && trail[i].color !== trail[segStart].color;
      const liftBreak  = !atEnd && trail[i].lift;
      // Also break when z crosses zero so each segment belongs to one side
      const startZ = trail[segStart].z || 0;
      const depthSort = tiltDeg > 1;
      const zBreak = depthSort && !atEnd && (startZ < 0) !== ((trail[i].z || 0) < 0);

      if (atEnd || colorBreak || liftBreak || zBreak) {
        const onCorrectSide = depthSort ? (belowPlane ? startZ < 0 : startZ >= 0) : !belowPlane;
        if (onCorrectSide && i - segStart > 1) {
          ctx.beginPath();
          ctx.strokeStyle = trail[segStart].color;
          ctx.lineWidth   = 1.5;
          ctx.lineCap     = 'round';
          ctx.lineJoin    = 'round';
          const [sx, sy] = toCanvas(...project(trail[segStart].x, trail[segStart].y, trail[segStart].z || 0));
          ctx.moveTo(sx, sy);
          for (let j = segStart + 1; j < i; j++) {
            const [px, py] = toCanvas(...project(trail[j].x, trail[j].y, trail[j].z || 0));
            ctx.lineTo(px, py);
          }
          ctx.stroke();
        }
        segStart = i;
      }
    }
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(frozenCanvas, 0, 0);
    if (tiltDeg > 1) {
      renderTrailPass(true);   // z < 0  — behind the plane
      drawZPlane();
      renderTrailPass(false);  // z >= 0 — in front of the plane
    } else {
      drawZPlane();            // flat grid background
      renderTrailPass(false);  // trail on top
    }
  }

  function loop() {
    if (!paused) {
      const stepsPerFrame = Math.max(1, Math.round(speed / 0.01));
      for (let i = 0; i < stepsPerFrame; i++) step();
    }
    render();
    requestAnimationFrame(loop);
  }

  // ── Wiring ──
  function wire(id, setter, fmt, lift = true) {
    const slider = document.getElementById(id);
    const label  = document.getElementById(id + '-val');
    slider.addEventListener('input', () => {
      setter(parseFloat(slider.value));
      label.textContent = fmt ? fmt(slider.value) : slider.value;
      if (lift) liftPen = true;
    });
  }

  wire('R',     v => R           = v);
  wire('r',     v => r           = v);
  wire('d',     v => d           = v);
  wire('speed', v => speed       = v, v => parseFloat(v).toFixed(2));
  wire('trail', v => trailLength = v, v => parseInt(v).toLocaleString(), false);

  document.getElementById('color').addEventListener('input', e => {
    color = e.target.value;
  });

  wire('depth3d', v => depth3D = v, v => parseInt(v));
  wire('freq3d',  v => freq3D  = v, v => parseFloat(v).toFixed(1));

  const pauseBtn = document.getElementById('pause-btn');
  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? '▶' : '⏸';
    pauseBtn.classList.toggle('paused', paused);
    if (!paused) liftPen = true;
  });

  document.getElementById('camera-btn').addEventListener('click', () => {
    frozenCtx.drawImage(canvas, 0, 0);
    trail = [];
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    frozenCtx.clearRect(0, 0, frozenCanvas.width, frozenCanvas.height);
    trail = [];
    angle = 0;
    tiltDeg = 0;
    azimDeg = 0;
    document.getElementById('controls-3d').hidden = true;
  });

  // ── Mobile panel toggle ──
  handle.addEventListener('click', () => {
    const isOpen = sidebar.classList.toggle('open');
    content.classList.toggle('panel-open', isOpen);
    // Resize canvas after CSS transition finishes
    setTimeout(resize, 370);
  });

  window.addEventListener('resize', resize);

  // ── 3D drag to orbit (mouse) ──
  let isDragging3D = false;

  canvas.addEventListener('mousedown', e => {
    isDragging3D = true;
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging3D) return;
    azimDeg = (azimDeg - e.movementX * 0.4 + 360) % 360;
    tiltDeg = Math.max(0, Math.min(90, tiltDeg - e.movementY * 0.3));
    if (tiltDeg > 5) document.getElementById('controls-3d').hidden = false;
  });

  window.addEventListener('mouseup', () => { isDragging3D = false; });

  // ── 3D drag to orbit (touch) ──
  let dragLastX = 0, dragLastY = 0;

  canvas.addEventListener('touchstart', e => {
    isDragging3D = true;
    dragLastX = e.touches[0].clientX;
    dragLastY = e.touches[0].clientY;
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    if (!isDragging3D) return;
    const dx = e.touches[0].clientX - dragLastX;
    const dy = e.touches[0].clientY - dragLastY;
    dragLastX = e.touches[0].clientX;
    dragLastY = e.touches[0].clientY;
    azimDeg = (azimDeg - dx * 0.4 + 360) % 360;
    tiltDeg = Math.max(0, Math.min(90, tiltDeg - dy * 0.3));
    if (tiltDeg > 5) document.getElementById('controls-3d').hidden = false;
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', () => { isDragging3D = false; }, { passive: false });

  // ── Prevent all page scroll (touch) except inside the sidebar ──
  document.addEventListener('touchmove', e => {
    if (!e.target.closest('#sidebar')) e.preventDefault();
  }, { passive: false });

  resize();
  requestAnimationFrame(loop);
</script>
</body>
</html>
