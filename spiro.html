<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spirograph — NEUROINSPO</title>
  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.165/build/three.module.min.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165/examples/jsm/"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    :root {
      --bg:               #edeae3;
      --card-bg:          #ffffff;
      --text:             #1c1a17;
      --text-mid:         #6b6760;
      --text-dim:         #a09c96;
      --shadow-rest:      0 2px 8px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
      --shadow-card:      0 16px 48px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      --ease-out:         cubic-bezier(0.22, 1, 0.36, 1);
      --radius:           18px;
      --header-h:         60px;
      --panel-collapsed:  48px;
      --panel-open:       52vh;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      flex-shrink: 0;
      background: rgba(237, 234, 227, 0.92);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      padding: 0 28px;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      color: var(--text);
      flex-shrink: 0;
    }
    .logo-icon svg { width: 100%; height: 100%; }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      user-select: none;
    }

    .logo-by {
      font-weight: 300;
      letter-spacing: 0.08em;
    }

    /* ── Content row ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 230px;
      min-width: 230px;
      background: var(--card-bg);
      border-right: 1px solid rgba(0,0,0,0.07);
      padding: 28px 20px 24px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Mobile handle — hidden on desktop */
    #sidebar-handle { display: none; }

    #sidebar-body {
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex: 1;
    }

    #sidebar-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .control-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .control-name {
      font-size: 12.5px;
      color: var(--text-mid);
      font-weight: 500;
    }

    .control-value {
      font-size: 11.5px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, monospace;
    }

    input[type="range"] {
      width: 100%;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(0,0,0,0.12);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { opacity: 0.65; }

    .color-control {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    /* z-depth controls — revealed on canvas drag */
    #controls-3d {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    input[type="color"] {
      width: 100%;
      height: 34px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      cursor: pointer;
      background: none;
      padding: 2px;
      outline: none;
    }

    .btn-row {
      margin-top: auto;
      display: flex;
      gap: 8px;
    }

    .btn-row button {
      flex: 1;
      padding: 8px 0;
      background: rgba(0,0,0,0.06);
      color: var(--text-mid);
      border: none;
      border-radius: 100px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }

    .btn-row button:hover {
      background: rgba(0,0,0,0.11);
      color: var(--text);
    }

    .btn-row button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    #pause-btn.paused {
      background: var(--text);
      color: var(--card-bg);
    }

    #ar-btn {
      background: #be185d;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
    }
    #ar-btn:hover {
      background: #9d174d !important;
      color: #fff !important;
    }

    /* ── Main (canvas area) ── */
    #main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 28px;
      min-width: 0;
    }

    #canvas-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
    }

    /* ── Mobile ── */
    @media (max-width: 540px) {

      header { padding: 0 16px; }
      .logo-text { font-size: 13px; }

      #content { flex-direction: column; }

      /* Canvas area — sits above the bottom sheet */
      #main {
        flex: none;
        width: 100%;
        padding: 12px;
        height: calc(100vh - var(--header-h) - var(--panel-collapsed));
        transition: height 0.35s var(--ease-out);
      }

      #content.panel-open #main {
        height: calc(100vh - var(--header-h) - var(--panel-open));
      }

      /* Bottom sheet */
      #sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        min-width: unset;
        border-right: none;
        border-top: 1px solid rgba(0,0,0,0.07);
        border-radius: 18px 18px 0 0;
        padding: 0;
        height: var(--panel-collapsed);
        overflow: hidden;
        transition: height 0.35s var(--ease-out);
        z-index: 100;
        box-shadow: 0 -4px 24px rgba(0,0,0,0.08);
      }

      #sidebar.open {
        height: var(--panel-open);
        overflow-y: auto;
      }

      /* Handle strip */
      #sidebar-handle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: var(--panel-collapsed);
        padding: 0 20px;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
      }

      #handle-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      #handle-chevron {
        font-size: 14px;
        color: var(--text-dim);
        transition: transform 0.3s var(--ease-out);
        line-height: 1;
      }

      #sidebar.open #handle-chevron {
        transform: rotate(180deg);
      }

      /* Desktop title hidden on mobile (handle label replaces it) */
      #sidebar-title { display: none; }

      #sidebar-body {
        padding: 4px 20px 24px;
        gap: 20px;
      }

      .btn-row { margin-top: 0; }
    }

    /* ── Dark mode ── */
    body.dark {
      --bg:       #1c1a17;
      --card-bg:  #272421;
      --text:     #c4c0b8;
      --text-mid: #968f87;
      --text-dim: #635d57;
      --shadow-rest: 0 2px 8px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,0,0,0.2);
      --shadow-card: 0 16px 48px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.25);
    }

    body.dark header {
      background: rgba(28, 26, 23, 0.92);
      border-bottom-color: rgba(255,255,255,0.07);
    }

    body.dark #sidebar {
      border-right-color: rgba(255,255,255,0.07);
    }

    body.dark input[type="range"] {
      background: rgba(255,255,255,0.12);
    }

    body.dark input[type="color"] {
      border-color: rgba(255,255,255,0.12);
    }

    body.dark .btn-row button {
      background: rgba(255,255,255,0.07);
    }

    body.dark .btn-row button:hover {
      background: rgba(255,255,255,0.13);
    }

    body.dark #pause-btn.paused {
      background: var(--text);
      color: var(--card-bg);
    }

    @media (max-width: 540px) {
      body.dark #sidebar {
        border-top-color: rgba(255,255,255,0.07);
      }
    }

    /* ── Theme toggle ── */
    .bottom-controls {
      position: fixed;
      bottom: 20px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 100;
      opacity: 0.4;
      transition: opacity 0.2s ease;
    }

    .bottom-controls:hover { opacity: 1; }

    .ctrl-pill {
      display: flex;
      align-items: center;
      background: rgba(28, 26, 23, 0.07);
      border-radius: 100px;
      padding: 3px;
      gap: 2px;
    }

    .ctrl-btn {
      border: none;
      background: transparent;
      padding: 6px 12px;
      border-radius: 100px;
      cursor: pointer;
      color: rgba(28, 26, 23, 0.35);
      transition: background 0.18s ease, color 0.18s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }

    .ctrl-btn.active        { background: rgba(28,26,23,0.1); color: rgba(28,26,23,0.78); }
    .ctrl-btn:hover:not(.active) { color: rgba(28,26,23,0.55); }

    body.dark .ctrl-pill              { background: rgba(255,255,255,0.08); }
    body.dark .ctrl-btn               { color: rgba(255,255,255,0.35); }
    body.dark .ctrl-btn.active        { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.88); }
    body.dark .ctrl-btn:hover:not(.active) { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>

<header>
  <a class="logo-group" href="index.html" aria-label="neuroinspo home">
    <div class="logo-icon">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="5.5" fill="currentColor"/>
        <line x1="22" y1="16" x2="22" y2="4"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="22" y1="28" x2="22" y2="40" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="16" y1="22" x2="4"  y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="28" y1="22" x2="40" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>

        <line x1="26.5" y1="17.5" x2="36" y2="8"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="17.5" y1="26.5" x2="8"  y2="36" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>

</header>

<div id="content">

  <aside id="sidebar">
    <!-- Mobile handle (hidden on desktop) -->
    <div id="sidebar-handle">
      <span id="handle-label">Controls</span>
      <span id="handle-chevron">▾</span>
    </div>

    <!-- Sidebar / panel body -->
    <div id="sidebar-body">
      <div id="sidebar-title">Parameters</div>

      <div class="controls">
        <div class="control">
          <div class="control-header">
            <span class="control-name">R — outer radius</span>
            <span class="control-value" id="R-val">131</span>
          </div>
          <input type="range" id="R" min="10" max="300" value="131" step="1">
        </div>

        <div class="control">
          <div class="control-header">
            <span class="control-name">r — inner radius</span>
            <span class="control-value" id="r-val">117</span>
          </div>
          <input type="range" id="r" min="10" max="300" value="117" step="1">
        </div>

        <div class="control">
          <div class="control-header">
            <span class="control-name">d — pen distance</span>
            <span class="control-value" id="d-val">221</span>
          </div>
          <input type="range" id="d" min="10" max="400" value="221" step="1">
        </div>

        <div class="control">
          <div class="control-header">
            <span class="control-name">Speed</span>
            <span class="control-value" id="speed-val">0.20</span>
          </div>
          <input type="range" id="speed" min="0.01" max="1.0" value="0.2" step="0.01">
        </div>

        <div class="control">
          <div class="control-header">
            <span class="control-name">Trail length</span>
            <span class="control-value" id="trail-val">4000</span>
          </div>
          <input type="range" id="trail" min="50" max="20000" value="4000" step="50">
        </div>

        <div class="color-control">
          <span class="control-name">Color</span>
          <input type="color" id="color" value="#5200AA">
        </div>

        <!-- z controls — revealed when canvas is dragged to tilt -->
        <div id="controls-3d" hidden>
          <div class="control">
            <div class="control-header">
              <span class="control-name">z — depth</span>
              <span class="control-value" id="depth3d-val">80</span>
            </div>
            <input type="range" id="depth3d" min="0" max="300" value="80" step="1">
          </div>
          <div class="control">
            <div class="control-header">
              <span class="control-name">z — frequency</span>
              <span class="control-value" id="freq3d-val">1.0</span>
            </div>
            <input type="range" id="freq3d" min="0.01" max="2" value="1.0" step="0.01">
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button id="pause-btn" title="Pause">⏸</button>
        <button id="camera-btn" title="Freeze to canvas">📷</button>
        <button id="clear-btn" title="Clear canvas">⟳</button>
        <button id="ar-btn" title="View in Augmented Reality" hidden>AR</button>
      </div>
    </div>
  </aside>

  <div id="main">
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

</div>

<!-- WebXR canvas — fullscreen, visible only during AR session -->
<canvas id="xr-canvas" style="display:none;position:fixed;inset:0;width:100%;height:100%;z-index:10;touch-action:none"></canvas>

<!-- AR dom-overlay — rendered on top of camera feed -->
<div id="ar-overlay" style="display:none;position:fixed;inset:0;z-index:20;flex-direction:column;align-items:center;justify-content:space-between;padding:56px 24px 48px;pointer-events:none;font-family:'Space Grotesk',system-ui,sans-serif">
  <span id="ar-hint" style="color:#fff;font-size:14px;font-weight:500;letter-spacing:0.05em;text-shadow:0 1px 6px rgba(0,0,0,0.65)">
    Point at a flat surface · tap to place
  </span>
  <button id="ar-exit-btn" style="pointer-events:auto;padding:10px 28px;background:rgba(0,0,0,0.5);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:100px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)">✕ Exit AR</button>
</div>

<script type="module">
import * as THREE      from 'three';
import { Line2 }        from 'three/addons/lines/Line2.js';
import { LineMaterial } from 'three/addons/lines/LineMaterial.js';
import { LineGeometry } from 'three/addons/lines/LineGeometry.js';

  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');
  const wrap    = document.getElementById('canvas-wrap');
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('content');
  const handle  = document.getElementById('sidebar-handle');

  // ── Parameters ──
  let R           = 131;
  let r           = 117;
  let d           = 221;
  let speed       = 0.2;
  let color       = '#5200AA';
  let trailLength = 4000;

  // ── 3D parameters ──
  let depth3D = 80;
  let freq3D  = 1.0;

  // View angles — 0/0 = flat top-down (classic look); drag canvas to orbit
  let tiltDeg = 0;   // 0 = top-down, 90 = edge-on
  let azimDeg = 0;   // rotation around Z axis

  // Orthographic projection: rotate by azim around Z, then tilt around new X
  function project(x, y, z) {
    const a  = azimDeg * Math.PI / 180;
    const t  = tiltDeg * Math.PI / 180;
    const ca = Math.cos(a), sa = Math.sin(a);
    const ct = Math.cos(t), st = Math.sin(t);
    const xr = x * ca + y * sa;
    const yr = -x * sa + y * ca;
    return [xr, yr * ct - z * st];
  }

  function drawZPlane() {
    const scale = (canvas.width / 2) / HALF_RANGE;
    const cx    = canvas.width  / 2;
    const cy    = canvas.height / 2;
    const lw    = 1 / scale;   // 1 px in screen space

    // Dynamic projection transform: math-space (x,y) on z=0 → canvas
    const a  = azimDeg * Math.PI / 180;
    const t  = tiltDeg * Math.PI / 180;
    const ca = Math.cos(a), sa = Math.sin(a), ct = Math.cos(t);
    ctx.save();
    ctx.transform(ca*scale, sa*ct*scale, sa*scale, -ca*ct*scale, cx, cy);

    // Gray fill
    ctx.fillStyle = 'rgba(140, 140, 140, 0.12)';
    ctx.fillRect(-HALF_RANGE, -HALF_RANGE, HALF_RANGE * 2, HALF_RANGE * 2);

    // Grid lines
    const step = HALF_RANGE / 4;   // 8 cells across
    ctx.strokeStyle = 'rgba(90, 90, 90, 0.15)';
    ctx.lineWidth   = lw;
    ctx.beginPath();
    for (let i = -4; i <= 4; i++) {
      ctx.moveTo(-HALF_RANGE, i * step);
      ctx.lineTo( HALF_RANGE, i * step);
      ctx.moveTo(i * step, -HALF_RANGE);
      ctx.lineTo(i * step,  HALF_RANGE);
    }
    ctx.stroke();

    // Border
    ctx.strokeStyle = 'rgba(90, 90, 90, 0.25)';
    ctx.lineWidth   = lw * 1.5;
    ctx.strokeRect(-HALF_RANGE, -HALF_RANGE, HALF_RANGE * 2, HALF_RANGE * 2);

    ctx.restore();
  }

  // ── State ──
  let angle        = 0;
  let liftPen      = false;
  let paused       = false;
  let frozenCanvas = new OffscreenCanvas(1, 1);
  let frozenCtx    = frozenCanvas.getContext('2d');
  // Each point: { x, y, color, lift }
  let trail = [];
  let inAR  = false;

  const HALF_RANGE = 720;

  function resize() {
    const rect = wrap.getBoundingClientRect();
    const size = Math.floor(Math.min(rect.width, rect.height)) - 4;
    if (size <= 0 || size === canvas.width) return;
    const tmp = new OffscreenCanvas(size, size);
    tmp.getContext('2d').drawImage(frozenCanvas, 0, 0, size, size);
    canvas.width  = size;
    canvas.height = size;
    frozenCanvas = new OffscreenCanvas(size, size);
    frozenCtx    = frozenCanvas.getContext('2d');
    frozenCtx.drawImage(tmp, 0, 0);
  }

  function toCanvas(x, y) {
    const scale = (canvas.width / 2) / HALF_RANGE;
    return [canvas.width / 2 + x * scale, canvas.height / 2 - y * scale];
  }

  function step() {
    angle += speed;
    const x = (R - r) * Math.cos(angle) + d * Math.cos(((R - r) / r) * angle);
    const y = (R - r) * Math.sin(angle) - d * Math.sin(((R - r) / r) * angle);
    const z = depth3D * Math.sin(freq3D * angle);
    // Store math-space coords so the trail rescales correctly on canvas resize
    trail.push({ x, y, z, color, lift: liftPen });
    liftPen = false;
    if (trail.length > trailLength) trail.splice(0, trail.length - trailLength);
  }

  // Draw the full trail in one pass — plane is drawn first so it sits behind.
  // z-based depth splitting was removed: it silently dropped segments at every
  // z=0 crossing where consecutive points had opposite signs (1-point segments
  // fail the i-segStart > 1 guard). The plane is only 12% opaque so the
  // occlusion difference is imperceptible.
  function renderTrail() {
    if (trail.length < 2) return;
    let segStart = 0;
    for (let i = 1; i <= trail.length; i++) {
      const atEnd      = i === trail.length;
      const colorBreak = !atEnd && trail[i].color !== trail[segStart].color;
      const liftBreak  = !atEnd && trail[i].lift;

      if (atEnd || colorBreak || liftBreak) {
        if (i - segStart > 1) {
          ctx.beginPath();
          ctx.strokeStyle = trail[segStart].color;
          ctx.lineWidth   = 1.5;
          ctx.lineCap     = 'round';
          ctx.lineJoin    = 'round';
          const [sx, sy] = toCanvas(...project(trail[segStart].x, trail[segStart].y, trail[segStart].z || 0));
          ctx.moveTo(sx, sy);
          for (let j = segStart + 1; j < i; j++) {
            const [px, py] = toCanvas(...project(trail[j].x, trail[j].y, trail[j].z || 0));
            ctx.lineTo(px, py);
          }
          ctx.stroke();
        }
        segStart = i;
      }
    }
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(frozenCanvas, 0, 0);
    drawZPlane();   // plane first — trail draws on top
    renderTrail();
  }

  function loop() {
    if (inAR) return;   // XR loop takes over; restart on AR exit
    if (!paused) {
      const stepsPerFrame = Math.max(1, Math.round(speed / 0.01));
      for (let i = 0; i < stepsPerFrame; i++) step();
    }
    render();
    requestAnimationFrame(loop);
  }

  // ── Wiring ──
  function wire(id, setter, fmt, lift = true) {
    const slider = document.getElementById(id);
    const label  = document.getElementById(id + '-val');
    slider.addEventListener('input', () => {
      setter(parseFloat(slider.value));
      label.textContent = fmt ? fmt(slider.value) : slider.value;
      if (lift) liftPen = true;
    });
  }

  wire('R',     v => R           = v);
  wire('r',     v => r           = v);
  wire('d',     v => d           = v);
  wire('speed', v => speed       = v, v => parseFloat(v).toFixed(2));
  wire('trail', v => trailLength = v, v => parseInt(v).toLocaleString(), false);

  document.getElementById('color').addEventListener('input', e => {
    color = e.target.value;
  });

  wire('depth3d', v => depth3D = v, v => parseInt(v));
  wire('freq3d',  v => freq3D  = v, v => parseFloat(v).toFixed(1));

  const pauseBtn = document.getElementById('pause-btn');
  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? '▶' : '⏸';
    pauseBtn.classList.toggle('paused', paused);
    if (!paused) liftPen = true;
  });

  document.getElementById('camera-btn').addEventListener('click', () => {
    frozenCtx.drawImage(canvas, 0, 0);
    trail = [];
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    frozenCtx.clearRect(0, 0, frozenCanvas.width, frozenCanvas.height);
    trail = [];
    angle = 0;
    tiltDeg = 0;
    azimDeg = 0;
    document.getElementById('controls-3d').hidden = true;
    document.getElementById('camera-btn').disabled = false;
  });

  // ── Mobile panel toggle ──
  handle.addEventListener('click', () => {
    const isOpen = sidebar.classList.toggle('open');
    content.classList.toggle('panel-open', isOpen);
    // Resize canvas after CSS transition finishes
    setTimeout(resize, 370);
  });

  window.addEventListener('resize', resize);

  // ── 3D drag to orbit (mouse) ──
  let isDragging3D = false;

  canvas.addEventListener('mousedown', e => {
    isDragging3D = true;
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging3D) return;
    azimDeg = (azimDeg - e.movementX * 0.4 + 360) % 360;
    tiltDeg = Math.max(0, Math.min(90, tiltDeg - e.movementY * 0.3));
    if (tiltDeg > 5) {
      document.getElementById('controls-3d').hidden = false;
      document.getElementById('camera-btn').disabled = true;
    }
  });

  window.addEventListener('mouseup', () => { isDragging3D = false; });

  // ── 3D drag to orbit (touch) ──
  let dragLastX = 0, dragLastY = 0;

  canvas.addEventListener('touchstart', e => {
    isDragging3D = true;
    dragLastX = e.touches[0].clientX;
    dragLastY = e.touches[0].clientY;
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    if (!isDragging3D) return;
    const dx = e.touches[0].clientX - dragLastX;
    const dy = e.touches[0].clientY - dragLastY;
    dragLastX = e.touches[0].clientX;
    dragLastY = e.touches[0].clientY;
    azimDeg = (azimDeg - dx * 0.4 + 360) % 360;
    tiltDeg = Math.max(0, Math.min(90, tiltDeg - dy * 0.3));
    if (tiltDeg > 5) {
      document.getElementById('controls-3d').hidden = false;
      document.getElementById('camera-btn').disabled = true;
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', () => { isDragging3D = false; }, { passive: false });

  // ── Prevent all page scroll (touch) except inside the sidebar ──
  document.addEventListener('touchmove', e => {
    if (!e.target.closest('#sidebar')) e.preventDefault();
  }, { passive: false });

  // ── WebXR / AR ──────────────────────────────────────────────────────────────

  // 50 cm total diameter (HALF_RANGE * 2 = 1440 math units → 0.5 m)
  const AR_SCALE = 0.5 / (HALF_RANGE * 2);

  function hexToRgb01(hex) {
    return [
      parseInt(hex.slice(1, 3), 16) / 255,
      parseInt(hex.slice(3, 5), 16) / 255,
      parseInt(hex.slice(5, 7), 16) / 255,
    ];
  }

  // Three.js objects — created once, reused across AR sessions
  let xrRenderer = null, xrScene = null, xrCamera = null;
  let xrReticle  = null, xrGroup = null;
  let xrLine = null, xrGeo = null, xrMat = null;
  let xrHitSource = null, xrPlaced = false;

  function ensureXRObjects() {
    if (xrRenderer) return;

    const xrCanvas = document.getElementById('xr-canvas');
    xrRenderer = new THREE.WebGLRenderer({ canvas: xrCanvas, alpha: true, antialias: true });
    xrRenderer.setPixelRatio(window.devicePixelRatio);
    xrRenderer.setSize(window.innerWidth, window.innerHeight);
    xrRenderer.xr.enabled = true;

    xrScene  = new THREE.Scene();
    xrCamera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    // Reticle — ring shown on detected surface while hunting for placement
    const rGeo = new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2);
    const rMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide,
                                               transparent: true, opacity: 0.75 });
    xrReticle = new THREE.Mesh(rGeo, rMat);
    xrReticle.matrixAutoUpdate = false;
    xrReticle.visible = false;
    xrScene.add(xrReticle);

    // Group locked to surface after tap — holds the spirograph line
    xrGroup = new THREE.Group();
    xrGroup.visible = false;
    xrScene.add(xrGroup);

    // Line2 for thick antialiased lines (updated every XR frame)
    xrGeo = new LineGeometry();
    xrGeo.setPositions([0, 0, 0, 0.001, 0, 0]);   // dummy; replaced each frame
    xrGeo.setColors([1, 1, 1, 1, 1, 1]);
    xrMat = new LineMaterial({
      vertexColors: true,
      linewidth: 2,   // CSS pixels
      resolution: new THREE.Vector2(window.innerWidth, window.innerHeight),
      alphaToCoverage: true,
    });
    xrLine = new Line2(xrGeo, xrMat);
    xrLine.frustumCulled = false;
    xrGroup.add(xrLine);
  }

  async function startAR() {
    ensureXRObjects();

    // Reset per-session state
    xrPlaced = false;
    xrReticle.visible = false;
    xrGroup.visible   = false;
    xrGroup.matrixAutoUpdate = true;

    const session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: [],
      optionalFeatures: ['hit-test'],
    });

    xrRenderer.xr.setSession(session);

    // Request hit-test source for reticle + surface placement
    try {
      const viewerSpace = await session.requestReferenceSpace('viewer');
      xrHitSource = await session.requestHitTestSource({ space: viewerSpace });
    } catch {
      xrHitSource = null;   // no surface detection; tap places at fixed distance
    }

    session.addEventListener('end', onAREnd);
    session.addEventListener('select', onARTap);
    document.getElementById('ar-exit-btn')
      .addEventListener('click', () => session.end(), { once: true });

    // Switch to AR UI
    inAR = true;
    document.getElementById('content').hidden = true;
    document.querySelector('header').hidden   = true;
    document.getElementById('xr-canvas').style.display    = 'block';
    document.getElementById('ar-overlay').style.display   = 'flex';
    document.getElementById('ar-hint').textContent = 'Point at a flat surface · tap to place';
    document.getElementById('ar-hint').style.display = '';

    xrRenderer.setAnimationLoop(xrFrame);
  }

  function onARTap() {
    if (xrPlaced) return;
    if (xrReticle.visible) {
      // Hit-test available — place exactly on the detected surface
      xrGroup.matrix.copy(xrReticle.matrix);
    } else {
      // No surface detection (e.g. visionOS without hit-test) —
      // place 1.5 m ahead, 0.6 m below the viewer (roughly table height)
      xrGroup.matrix.makeTranslation(0, -0.6, -1.5);
    }
    xrGroup.matrixAutoUpdate = false;
    xrGroup.visible = true;
    xrPlaced = true;
    trail   = [];
    angle   = 0;
    liftPen = false;
    document.getElementById('ar-hint').style.display = 'none';
  }

  function syncXRGeometry() {
    if (trail.length < 2) return;
    // Raise the spiral so its lowest z point sits at surface level (y = 0)
    const zFloor = -depth3D;
    const pos = [], col = [];
    for (const pt of trail) {
      // math (x, y, z) → Three.js (x, height-above-surface, -y)
      pos.push(pt.x * AR_SCALE, (pt.z - zFloor) * AR_SCALE, -pt.y * AR_SCALE);
      const [r, g, b] = hexToRgb01(pt.color);
      col.push(r, g, b);
    }
    xrGeo.setPositions(pos);
    xrGeo.setColors(col);
  }

  function xrFrame(timestamp, frame) {
    if (!frame) return;

    // Advance the spirograph once placement is confirmed
    if (xrPlaced) {
      const stepsPerFrame = Math.max(1, Math.round(speed / 0.01));
      for (let i = 0; i < stepsPerFrame; i++) step();
      syncXRGeometry();
    }

    // Move reticle to the detected horizontal surface under the view ray
    if (xrHitSource && !xrPlaced) {
      const refSpace = xrRenderer.xr.getReferenceSpace();
      const hits = frame.getHitTestResults(xrHitSource);
      if (hits.length > 0) {
        const pose = hits[0].getPose(refSpace);
        if (pose) {
          xrReticle.visible = true;
          xrReticle.matrix.fromArray(pose.transform.matrix);
        }
      } else {
        xrReticle.visible = false;
      }
    }

    xrRenderer.render(xrScene, xrCamera);
  }

  function onAREnd() {
    xrHitSource?.cancel();
    xrHitSource = null;
    xrRenderer.setAnimationLoop(null);

    // Restore 2D UI
    inAR = false;
    document.getElementById('content').hidden = false;
    document.querySelector('header').hidden   = false;
    document.getElementById('xr-canvas').style.display  = 'none';
    document.getElementById('ar-overlay').style.display = 'none';

    liftPen = true;
    requestAnimationFrame(loop);   // restart 2D loop
  }

  // Wire AR button.
  // Skip isSessionSupported — it gives false negatives on some visionOS builds.
  // Instead, always try requestSession on click and surface any real error.
  (() => {
    const btn = document.getElementById('ar-btn');
    if (!navigator?.xr) {
      // Clearly unsupported (iPhone/iPad Safari, desktop Firefox, …)
      btn.style.opacity = '0.45';
      btn.addEventListener('click', () =>
        alert('AR is not available in this browser.\nUse Android Chrome or Apple Vision Pro.'));
      return;
    }
    // navigator.xr exists → attempt session on tap; handles Android + visionOS
    btn.addEventListener('click', async () => {
      try {
        await startAR();
      } catch (err) {
        const isVisionOS = /iPad|iPhone/.test(navigator.userAgent) && navigator.maxTouchPoints > 1;
        const msg = err.name === 'NotSupportedError' && isVisionOS
          ? 'AR is not yet available in visionOS Safari.\n\nApple has not implemented WebXR immersive-ar sessions on Vision Pro. Use Android Chrome, or file feedback at feedbackassistant.apple.com.'
          : `Could not start AR:\n${err.name}: ${err.message || err}`;
        alert(msg);
      }
    });
  })();

  // ── Boot ────────────────────────────────────────────────────────────────────
  resize();
  requestAnimationFrame(loop);

  // ── Theme ────────────────────────────────────────────────────────────────────
  function applyTheme(theme) {
    document.body.classList.toggle('dark', theme === 'dark');
    document.querySelectorAll('[data-theme]').forEach(b =>
      b.classList.toggle('active', b.dataset.theme === theme)
    );
  }

  applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

  document.querySelectorAll('[data-theme]').forEach(btn => {
    btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
  });
</script>

<div class="bottom-controls">
  <div class="ctrl-pill" id="theme-toggle" role="group" aria-label="Color theme">
    <button class="ctrl-btn active" data-theme="light" title="Light mode">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="8" r="2.8" fill="currentColor"/>
        <line x1="8" y1="1"    x2="8" y2="3.5"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="8" y1="12.5" x2="8" y2="15"   stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="1"    y1="8" x2="3.5"  y2="8"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="12.5" y1="8" x2="15"   y2="8"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="2.9"  y1="2.9"  x2="4.7"  y2="4.7"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="11.3" y1="11.3" x2="13.1" y2="13.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="13.1" y1="2.9"  x2="11.3" y2="4.7"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="4.7"  y1="11.3" x2="2.9"  y2="13.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="ctrl-btn" data-theme="dark" title="Dark mode">
      <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M12.4 3.2 A6.5 6.5 0 1 0 12.4 12.8 A5 5 0 1 1 12.4 3.2 Z" fill="currentColor"/>
      </svg>
    </button>
  </div>
</div>
