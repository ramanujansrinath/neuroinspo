<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUPERLIST — NEUROINSPO × Sensorimotor Superlab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="superlist.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo-group">
        <a class="logo-icon-link" href="index.html" aria-label="neuroinspo">
          <div class="logo-icon" aria-hidden="true">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="22" cy="22" r="5.5" fill="currentColor"/>
              <line x1="22" y1="16" x2="22" y2="4"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="22" y1="28" x2="22" y2="40" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="16" y1="22" x2="4"  y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="28" y1="22" x2="40" y2="22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="17.5" y1="17.5" x2="8"  y2="8"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="26.5" y1="26.5" x2="36" y2="36" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="26.5" y1="17.5" x2="36" y2="8"  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="17.5" y1="26.5" x2="8"  y2="36" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <circle cx="22" cy="4"  r="2" fill="currentColor"/>
              <circle cx="22" cy="40" r="2" fill="currentColor"/>
              <circle cx="4"  cy="22" r="2" fill="currentColor"/>
              <circle cx="40" cy="22" r="2" fill="currentColor"/>
              <circle cx="8"  cy="8"  r="2" fill="currentColor"/>
              <circle cx="36" cy="36" r="2" fill="currentColor"/>
              <circle cx="36" cy="8"  r="2" fill="currentColor"/>
              <circle cx="8"  cy="36" r="2" fill="currentColor"/>
            </svg>
          </div>
        </a>
        <span class="logo-plus" aria-hidden="true">+</span>
        <a class="superlab-logo" href="https://superlab.ca/" target="_blank" rel="noopener" aria-label="Sensorimotor Superlab">
          <img src="https://superlab.ca/wusmsl_logo.png" alt="Sensorimotor Superlab" height="28">
        </a>
        <span class="logo-text">SUPERLIST<span class="logo-attribution"> <span class="logo-by">by</span> NEUROINSPO</span></span>
      </div>
    </div>
  </header>

  <main>
    <p class="page-byline">
      Trainees and PIs from the <a href="https://superlab.ca/" target="_blank" rel="noopener">Sensorimotor Superlab</a> at Western University contribute to this reading list.
    </p>
    <br><br>

    <div class="lists-grid" id="lists-grid"></div>

    <div class="loading" id="loading">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="empty-state" id="empty-state" hidden>
      <div class="empty-icon" aria-hidden="true">📋</div>
      <p>No reading lists yet.</p>
      <p class="empty-sub">Run <code>python process_superlist.py</code> to fetch the latest posts from superlab.ca.</p>
    </div>
  </main>

  <div class="bottom-controls">
    <div class="ctrl-pill" id="theme-toggle" role="group" aria-label="Color theme">
      <button class="ctrl-btn active" data-theme="light" title="Light mode">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="2.8" fill="currentColor"/>
          <line x1="8" y1="1"    x2="8" y2="3.5"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="8" y1="12.5" x2="8" y2="15"   stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="1"    y1="8" x2="3.5"  y2="8"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="12.5" y1="8" x2="15"   y2="8"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="2.9"  y1="2.9"  x2="4.7"  y2="4.7"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="11.3" y1="11.3" x2="13.1" y2="13.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="13.1" y1="2.9"  x2="11.3" y2="4.7"  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="4.7"  y1="11.3" x2="2.9"  y2="13.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="ctrl-btn" data-theme="dark" title="Dark mode">
        <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
          <path d="M12.4 3.2 A6.5 6.5 0 1 0 12.4 12.8 A5 5 0 1 1 12.4 3.2 Z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="superlist.js"></script>
</body>
</html>
